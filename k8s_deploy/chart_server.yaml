---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oe-cert
  namespace: njord
spec:
  secretName: njord-cert
  commonName: openenc.com
  dnsNames:
    - openenc.com
    - www.openenc.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: njord-ingress
  namespace: njord
spec:
  ingressClassName: haproxy
  rules:
    - host: openenc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: njord-chart-svc
                port:
                  number: 80
    - host: www.openenc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: njord-chart-svc
                port:
                  number: 80
  tls:
    - hosts:
        - openenc.com
        - www.openenc.com
      secretName: njord-cert
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: njord-ingest-rs
  namespace: njord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: njord-ingest
  template:
    metadata:
      labels:
        app: njord-ingest
    spec:
      imagePullSecrets:
        - name: ghreg
      containers:
        - image: ghcr.io/manimaul/njord-chart-server:latest
          imagePullPolicy: Always
          name: njord-ingest
          command: ["/opt/njord/ingest.kexe", "/opt/njord/resources"]
          resources:
            limits:
              cpu: "1.0"
              memory: "3G"
            requests:
              cpu: 500m
              memory: "1G"
          volumeMounts:
            - name: njord-config-vol
              mountPath: /opt/njord/resources/config/application.json
              subPath: application.json
              readOnly: true
            - name: njord-shared-data
              mountPath: /mnt/njord
          env:
            - name: CHART_SERVER_OPTS
              valueFrom:
                secretKeyRef:
                  name: admin-secret-json
